<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 560" width="512" height="560">
  <defs>
    <!-- Primary brand gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c8aff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <!-- Left prong gradient -->
    <linearGradient id="prongL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7b9aff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Center prong gradient -->
    <linearGradient id="prongC" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6c8aff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <!-- Right prong gradient -->
    <linearGradient id="prongR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6c8aff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ============================= -->
  <!--  CLAW MARK (Icon)             -->
  <!--  A mechanical claw with 3     -->
  <!--  prongs descending from a     -->
  <!--  hub, each gripping an agent  -->
  <!--  node (container).            -->
  <!-- ============================= -->

  <!-- Subtle ambient glow -->
  <circle cx="256" cy="235" r="100" fill="#6c8aff" opacity="0.04"/>
  <circle cx="256" cy="235" r="60" fill="#6c8aff" opacity="0.06"/>

  <!-- ── Connection lines (network mesh behind the claw) ── -->
  <g stroke="#6c8aff" stroke-width="1.5" fill="none" opacity="0.15">
    <line x1="130" y1="355" x2="256" y2="385"/>
    <line x1="382" y1="355" x2="256" y2="385"/>
    <line x1="130" y1="355" x2="382" y2="355"/>
  </g>

  <!-- ── Top hub / mounting bar ── -->
  <rect x="176" y="88" width="160" height="28" rx="14" fill="url(#brandGrad)" filter="url(#shadow)"/>
  <!-- Hub details (two small bolts) -->
  <circle cx="200" cy="102" r="4" fill="#0a0c10" opacity="0.4"/>
  <circle cx="312" cy="102" r="4" fill="#0a0c10" opacity="0.4"/>

  <!-- ── Arm (vertical connector from hub) ── -->
  <rect x="244" y="116" width="24" height="44" rx="6" fill="url(#prongC)" opacity="0.7"/>

  <!-- ── Junction piece (where prongs split) ── -->
  <circle cx="256" cy="172" r="22" fill="url(#brandGrad)" filter="url(#shadow)"/>
  <circle cx="256" cy="172" r="12" fill="#12151e"/>
  <circle cx="256" cy="172" r="6" fill="url(#brandGrad)" opacity="0.8"/>

  <!-- ── LEFT PRONG ── -->
  <path d="M 240 186
           C 210 230, 150 280, 130 320
           C 118 345, 118 355, 130 365
           C 140 373, 152 368, 155 355"
        stroke="url(#prongL)" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- ── CENTER PRONG ── -->
  <path d="M 256 194
           C 256 240, 256 300, 256 340
           C 256 362, 256 372, 246 380
           C 238 386, 230 380, 232 368"
        stroke="url(#prongC)" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- ── RIGHT PRONG ── -->
  <path d="M 272 186
           C 302 230, 362 280, 382 320
           C 394 345, 394 355, 382 365
           C 372 373, 360 368, 357 355"
        stroke="url(#prongR)" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- ── AGENT NODES (containers being held by claw) ── -->

  <!-- Left agent node -->
  <g filter="url(#shadow)">
    <rect x="108" y="340" width="44" height="32" rx="8" fill="#12151e" stroke="url(#prongL)" stroke-width="2"/>
    <!-- Container icon lines -->
    <line x1="118" y1="350" x2="140" y2="350" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
    <line x1="118" y1="356" x2="134" y2="356" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
    <line x1="118" y1="362" x2="128" y2="362" stroke="#a78bfa" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- Center agent node -->
  <g filter="url(#shadow)">
    <rect x="234" y="370" width="44" height="32" rx="8" fill="#12151e" stroke="url(#prongC)" stroke-width="2"/>
    <line x1="244" y1="380" x2="266" y2="380" stroke="#9795f0" stroke-width="1.5" opacity="0.6"/>
    <line x1="244" y1="386" x2="260" y2="386" stroke="#9795f0" stroke-width="1.5" opacity="0.4"/>
    <line x1="244" y1="392" x2="254" y2="392" stroke="#9795f0" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- Right agent node -->
  <g filter="url(#shadow)">
    <rect x="360" y="340" width="44" height="32" rx="8" fill="#12151e" stroke="url(#prongR)" stroke-width="2"/>
    <line x1="370" y1="350" x2="392" y2="350" stroke="#c084fc" stroke-width="1.5" opacity="0.6"/>
    <line x1="370" y1="356" x2="386" y2="356" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>
    <line x1="370" y1="362" x2="380" y2="362" stroke="#c084fc" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- Small status dots on agent nodes (like the sidebar dots) -->
  <circle cx="144" cy="346" r="3.5" fill="#4ade80"/>
  <circle cx="270" cy="376" r="3.5" fill="#22d3ee"/>
  <circle cx="396" cy="346" r="3.5" fill="#4ade80"/>

  <!-- ============================= -->
  <!--  WORDMARK                     -->
  <!-- ============================= -->
  <text x="256" y="475" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif"
        font-size="54" font-weight="800" letter-spacing="-2"
        fill="url(#brandGrad)">
    autosclaw
  </text>

  <!-- Tagline -->
  <text x="256" y="505" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif"
        font-size="14" font-weight="500" letter-spacing="4"
        fill="#7c829a" text-transform="uppercase">
    AGENT ORCHESTRATION
  </text>
</svg>
